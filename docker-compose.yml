version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rfm-server
    ports:
      - "18120:18120"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - CONFIG_PATH=/app/config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:18120/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - rfm-network

networks:
  rfm-network:
    driver: bridge
